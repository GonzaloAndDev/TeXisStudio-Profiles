name: Empaquetar perfiles

# Se ejecuta en cada push a main y genera/actualiza la release "latest".
#
# Estructura del repo (4 niveles):
#   <continent>/<country>/<institution>/<style_id>/profile.yaml
#   <continent>/<country>/<institution>/<style_id>/manifest.yaml
#   <continent>/<country>/<institution>/_institution.yaml  (metadata compartida)
#
# El ZIP se nombra con el campo `id` del manifest (globalmente unico).
# Scripts auxiliares en .github/scripts/ contienen toda la logica Python.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Crear ZIPs y publicar release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar PyYAML
        run: pip install pyyaml --quiet

      - name: Empaquetar perfiles como ZIPs
        run: python3 .github/scripts/package_profiles.py

      - name: Calcular SHA256 de cada ZIP
        run: python3 .github/scripts/sha256sums.py

      - name: Generar catalogo JSON
        run: python3 .github/scripts/build_catalog.py

      - name: Eliminar release latest existente
        run: gh release delete latest --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Eliminar tag latest del remoto
        run: git push origin :refs/tags/latest || true

      - name: Publicar nueva release latest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Perfiles - ultima version"
          body: |
            Perfiles oficiales de TeXisStudio actualizados automaticamente.

            Estructura: Continente > Pais > Institucion > Estilo/Carrera

            Como instalar: abre TeXisStudio > Biblioteca > Comunidad.

            Catalogo completo (JSON):
              https://github.com/GonzaloAndDev/TeXisStudio-Profiles/releases/latest/download/catalog.json

            Descarga por perfil:
              https://github.com/GonzaloAndDev/TeXisStudio-Profiles/releases/latest/download/<manifest_id>.zip
          files: |
            dist/*.zip
            dist/catalog.json
            dist/SHA256SUMS.json
          make_latest: true
