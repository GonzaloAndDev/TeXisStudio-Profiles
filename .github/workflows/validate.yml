name: Validate Profiles

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      texisstudio_ref:
        description: "Commit SHA, tag, or branch of GonzaloAndDev/TeXisStudio for P3"
        required: false
        type: string

jobs:
  validate-yaml:
    name: Validate YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml jsonschema --quiet

      - name: Validate all YAML files
        run: |
          python - <<'PY'
          import yaml, pathlib, sys
          errors = []
          for path in sorted(pathlib.Path('.').rglob('*.yaml')):
              if '.git' in path.parts:
                  continue
              try:
                  yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as e:
                  errors.append(f"YAML ERROR {path}: {e}")
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          count = len([p for p in pathlib.Path('.').rglob('*.yaml') if '.git' not in p.parts])
          print(f"OK: {count} archivos YAML validos")
          PY

  validate-catalog:
    name: Verify dist/catalog.json is up to date (D2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml --quiet

      - name: Regenerate catalog and check for diff
        run: |
          python3 .github/scripts/build_catalog.py
          git diff --exit-code dist/catalog.json || (
            echo ""
            echo "ERROR: dist/catalog.json está desactualizado."
            echo "Ejecuta: python3 .github/scripts/build_catalog.py"
            echo "y haz commit del resultado."
            exit 1
          )

  validate-profiles-structure:
    name: Validate profile structure and policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml --quiet

      - name: Check required fields and policy (POL_* rules)
        run: |
          python - <<'PY'
          import yaml, pathlib, sys
          errors = []
          warnings = []
          REQUIRED = ['id', 'name', 'schema_version', 'status', 'document_class',
                      'latex_engine', 'bibliography_backend', 'bibliography_style', 'sections']
          for path in sorted(pathlib.Path('.').rglob('profile.yaml')):
              if '.git' in path.parts or 'profile_samples' in path.parts:
                  continue
              try:
                  p = yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as e:
                  errors.append(f"PARSE ERROR {path}: {e}")
                  continue
              for field in REQUIRED:
                  if field not in p:
                      errors.append(f"MISSING FIELD '{field}' in {path}")
              status = p.get('status', '')
              ver = p.get('verification') or {}
              if status in ('reviewed', 'verified'):
                  # POL_REVIEWED_NO_SOURCE_URLS
                  if not ver.get('source_urls'):
                      errors.append(f"POL_REVIEWED_NO_SOURCE_URLS: {path}")
                  # POL_REVIEWED_NO_DATE
                  if not ver.get('reviewed_at') and not ver.get('verified_at'):
                      errors.append(f"POL_REVIEWED_NO_DATE: {path}")
                  # POL_REVIEWED_NO_INTERVAL
                  if not ver.get('review_interval_days'):
                      warnings.append(f"POL_REVIEWED_NO_INTERVAL (warning): {path}")
              if status == 'verified':
                  # POL_VERIFIED_NO_VERIFIED_AT
                  if not ver.get('verified_at'):
                      errors.append(f"POL_VERIFIED_NO_VERIFIED_AT: {path}")
                  # POL_VERIFIED_NO_VERIFIED_BY
                  if not ver.get('verified_by'):
                      errors.append(f"POL_VERIFIED_NO_VERIFIED_BY: {path}")
                  # POL_VERIFIED_NO_CI_EVIDENCE — evidencia de CI obligatoria (P1.8/P3 audit v2.2)
                  if not ver.get('ci_evidence'):
                      errors.append(f"POL_VERIFIED_NO_CI_EVIDENCE: {path}")
          for w in warnings:
              print(f"WARN: {w}")
          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)
          count = len([p for p in pathlib.Path('.').rglob('profile.yaml')
                       if '.git' not in p.parts and 'profile_samples' not in p.parts])
          print(f"OK: {count} perfiles validos")
          PY

  compile-sample-us-mit-ieee:
    name: P3 — Compile us_mit_ieee sample project with LaTeX
    runs-on: ubuntu-latest
    # Solo ejecutar en main/master para ahorrar minutos de CI en PRs de baja prioridad
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      # ── Instalar TeX Live con paquetes requeridos por us_mit_ieee (IEEE + APA) ──
      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            texlive-xetex \
            texlive-bibtex-extra \
            texlive-latex-recommended \
            texlive-publishers \
            texlive-science \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-spanish \
            biber \
            latexmk \
            poppler-utils
          # Verificar explícitamente los paquetes que TeXisStudio genera siempre.
          for sty in \
            fontspec.sty \
            geometry.sty \
            graphicx.sty \
            booktabs.sty \
            longtable.sty \
            caption.sty \
            setspace.sty \
            microtype.sty \
            csquotes.sty \
            hyperref.sty \
            listings.sty \
            algorithm.sty \
            algpseudocode.sty \
            biblatex.sty
          do
            kpsewhich "$sty" >/dev/null || { echo "ERROR: $sty no encontrado en TeX Live"; exit 1; }
          done
          # Verificar estilos biblatex necesarios para IEEE
          kpsewhich ieee.bbx >/dev/null || { echo "ERROR: ieee.bbx no encontrado — instala texlive-publishers"; exit 1; }

      # ── Instalar Rust para compilar texis-cli ──
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve pinned TeXisStudio ref for P3
        id: texis_ref
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.texisstudio_ref }}" ]; then
            REF="${{ github.event.inputs.texisstudio_ref }}"
          else
            REF="$(grep -v '^[[:space:]]*#' .github/p3-texisstudio-ref.txt | sed '/^[[:space:]]*$/d' | head -n1 | tr -d '[:space:]')"
          fi

          if [ -z "$REF" ]; then
            echo "ERROR: P3 TeXisStudio ref vacío"
            exit 1
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Using TeXisStudio ref: $REF"

      # El código fuente de TeXisStudio-main está embebido en profile_samples como referencia
      # Para compilar necesitamos el repo principal — lo clonamos en una referencia PINNED
      # para que el sample verificado no dependa de un main flotante.
      - name: Clone TeXisStudio main repo
        uses: actions/checkout@v4
        with:
          repository: GonzaloAndDev/TeXisStudio
          path: _texis_main
          ref: ${{ steps.texis_ref.outputs.ref }}
          # Si el repo es privado, añadir: token: ${{ secrets.GH_PAT }}

      - name: Show resolved TeXisStudio commit
        working-directory: _texis_main
        run: |
          echo "Requested ref: ${{ steps.texis_ref.outputs.ref }}"
          git rev-parse HEAD
          git log -1 --oneline

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            _texis_main/target/
          key: ${{ runner.os }}-cargo-texis-main-${{ hashFiles('_texis_main/**/Cargo.lock', '_texis_main/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-texis-main-

      - name: Build texis-cli
        working-directory: _texis_main
        run: cargo build --release -p texis-cli

      - name: Validate sample project structure
        run: |
          SAMPLE=profile_samples/us_mit_ieee
          if [ ! -f "$SAMPLE/project.texis/tesis.project.yaml" ]; then
            echo "ERROR: tesis.project.yaml no encontrado en $SAMPLE/project.texis"
            exit 1
          fi
          echo "OK: estructura del sample us_mit_ieee verificada"

      - name: Validate sample project (P2.2 — preflight before compile)
        run: |
          TEXIS=_texis_main/target/release/texis
          SAMPLE=profile_samples/us_mit_ieee/project.texis
          $TEXIS validate "$SAMPLE" || {
            echo "ERROR: texis validate reportó errores. Resolver antes de compilar."
            exit 1
          }
          echo "OK: validación preflight pasada"

      - name: Generate LaTeX and compile
        run: |
          TEXIS=_texis_main/target/release/texis
          SAMPLE=profile_samples/us_mit_ieee/project.texis
          $TEXIS compile "$SAMPLE" --backend latexmk || {
            echo "--- LaTeX build log ---"
            cat "$SAMPLE/build/main.log" 2>/dev/null | tail -60 || echo "(no build log)"
            exit 1
          }
          echo "OK: compilación completada"

      - name: Assert bibliography was actually generated
        run: |
          SAMPLE=profile_samples/us_mit_ieee/project.texis
          BBL="$SAMPLE/build/main.bbl"
          LOG="$SAMPLE/build/main.log"
          if [ ! -s "$BBL" ]; then
            echo "ERROR: bibliography file missing or empty: $BBL"
            exit 1
          fi
          if grep -q "Empty bibliography" "$LOG"; then
            echo "ERROR: main.log still reports empty bibliography"
            tail -60 "$LOG" || true
            exit 1
          fi
          if grep -q "Please (re)run Biber" "$LOG"; then
            echo "ERROR: main.log still asks to rerun Biber"
            tail -60 "$LOG" || true
            exit 1
          fi
          echo "OK: bibliografía generada y resuelta"

      - name: Run postflight (pdfinfo + pdffonts)
        run: |
          PDF=profile_samples/us_mit_ieee/project.texis/build/main.pdf
          if [ ! -f "$PDF" ]; then
            echo "ERROR: PDF no generado en $PDF"
            exit 1
          fi
          pdfinfo "$PDF"
          pdffonts "$PDF"
          echo "OK: postflight PDF aprobado"

      - name: Assert build output artifacts (P2.2 — output contracts)
        run: |
          SAMPLE=profile_samples/us_mit_ieee/project.texis/build
          ERRORS=0
          # PDF compilado
          if [ ! -f "$SAMPLE/main.pdf" ]; then
            echo "ERROR: main.pdf no existe"
            ERRORS=$((ERRORS+1))
          else
            echo "OK: main.pdf existe ($(wc -c < $SAMPLE/main.pdf) bytes)"
          fi
          # Bibliografía generada
          if [ ! -s "$SAMPLE/main.bbl" ]; then
            echo "ERROR: main.bbl no existe o está vacío"
            ERRORS=$((ERRORS+1))
          else
            echo "OK: main.bbl existe"
          fi
          # Log de compilación
          if [ ! -f "$SAMPLE/main.log" ]; then
            echo "ERROR: main.log no existe"
            ERRORS=$((ERRORS+1))
          else
            echo "OK: main.log existe ($(wc -l < $SAMPLE/main.log) líneas)"
          fi
          if [ $ERRORS -ne 0 ]; then
            echo "TOTAL: $ERRORS artifact(s) faltantes"
            exit 1
          fi
          echo "OK: todos los artefactos de salida presentes"

      - name: Export delivery package (P2.2 — secuencia contractual completa)
        run: |
          TEXIS=_texis_main/target/release/texis
          SAMPLE=profile_samples/us_mit_ieee/project.texis
          OUTDIR=profile_samples/us_mit_ieee/delivery_output

          mkdir -p "$OUTDIR"
          $TEXIS export-delivery "$SAMPLE" --output "$OUTDIR" --mode draft || {
            echo "ERROR: texis export-delivery falló"
            exit 1
          }
          echo "OK: paquete de entrega generado"

      - name: Assert delivery package artifacts (P2.2 gate)
        run: |
          OUTDIR=profile_samples/us_mit_ieee/delivery_output
          ERRORS=0

          # ZIP de entrega debe existir
          ZIP_COUNT=$(find "$OUTDIR" -name "*_entrega.zip" | wc -l)
          if [ "$ZIP_COUNT" -eq 0 ]; then
            echo "ERROR: no se encontró *_entrega.zip en $OUTDIR"
            ERRORS=$((ERRORS+1))
          else
            ZIP=$(find "$OUTDIR" -name "*_entrega.zip" | head -1)
            echo "OK: ZIP generado — $(basename $ZIP) ($(wc -c < $ZIP) bytes)"

            # Verificar artefactos críticos dentro del ZIP
            for artifact in \
              "thesis.pdf" \
              "compliance_report.json" \
              "postflight_report.json" \
              "compilation_reproducibility.json" \
              "manifest.sha256.json" \
              "submission_checklist.md" \
              "README.txt"
            do
              if unzip -l "$ZIP" | grep -q "$artifact"; then
                echo "  OK: $artifact presente"
              else
                echo "  ERROR: $artifact ausente del ZIP"
                ERRORS=$((ERRORS+1))
              fi
            done
          fi

          if [ $ERRORS -ne 0 ]; then
            echo "TOTAL: $ERRORS artefacto(s) faltante(s) en el paquete de entrega"
            exit 1
          fi
          echo "OK: paquete de entrega completo y verificado"

      - name: Upload LaTeX logs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: us_mit_ieee_build_logs
          path: |
            profile_samples/us_mit_ieee/project.texis/build/main.log
            profile_samples/us_mit_ieee/project.texis/build/main.bbl
            profile_samples/us_mit_ieee/project.texis/build/main.bcf
          if-no-files-found: warn

      - name: Upload compiled PDF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: us_mit_ieee_compiled_pdf
          path: profile_samples/us_mit_ieee/project.texis/build/main.pdf
          if-no-files-found: warn

      - name: Upload delivery package as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: us_mit_ieee_delivery_package
          path: profile_samples/us_mit_ieee/delivery_output/*.zip
          if-no-files-found: warn

  validate-sample-projects:
    name: Validate sample project structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml --quiet

      - name: Validate sample project YAML and structure
        run: |
          python - <<'PY'
          import yaml, json, pathlib, sys
          errors = []

          def iter_sections(sections):
              for section in sections or []:
                  yield section
                  yield from iter_sections(section.get('children') or [])

          samples_dir = pathlib.Path('profile_samples')
          if not samples_dir.exists():
              print("OK: no sample projects directory (skipping)")
              sys.exit(0)
          for sample in sorted(samples_dir.iterdir()):
              if not sample.is_dir():
                  continue
              project_dir = sample / 'project.texis'
              project_yaml = project_dir / 'tesis.project.yaml'
              checklist = sample / 'expected_checklist.json'
              if not project_yaml.exists():
                  errors.append(f"MISSING tesis.project.yaml in {sample}")
                  continue
              if not checklist.exists():
                  errors.append(f"MISSING expected_checklist.json in {sample}")
              try:
                  p = yaml.safe_load(project_yaml.read_text(encoding='utf-8'))
              except Exception as e:
                  errors.append(f"YAML ERROR in {project_yaml}: {e}")
                  continue
              for field in ['schema_version', 'profile_id', 'metadata', 'sections']:
                  if field not in p:
                      errors.append(f"MISSING '{field}' in {project_yaml}")
              has_bib = (project_dir / 'content' / 'bibliography' / 'references.bib').exists()
              has_references_section = any(
                  s.get('enabled', True) and s.get('element_id') == 'references'
                  for s in iter_sections(p.get('sections'))
              )
              citation_blocks = sum(
                  1
                  for s in iter_sections(p.get('sections'))
                  for b in (s.get('blocks') or [])
                  if b.get('type') == 'citation'
              )
              if has_bib and has_references_section and citation_blocks == 0:
                  errors.append(
                      f"MISSING citation blocks in {project_yaml} — sample has references.bib "
                      f"and a references section but no semantic citations."
                  )
              if checklist.exists():
                  try:
                      json.loads(checklist.read_text(encoding='utf-8'))
                  except Exception as e:
                      errors.append(f"JSON ERROR in {checklist}: {e}")
              print(f"  OK: {sample.name} (profile_id={p.get('profile_id','?')}, "
                    f"sections={len(p.get('sections', []))})")
          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)
          count = sum(1 for s in samples_dir.iterdir() if s.is_dir())
          print(f"OK: {count} sample project(s) valid")
          PY
