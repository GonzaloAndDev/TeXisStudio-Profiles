name: Validate Profiles

on:
  push:
  pull_request:

jobs:
  validate-yaml:
    name: Validate YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml jsonschema --quiet

      - name: Validate all YAML files
        run: |
          python - <<'PY'
          import yaml, pathlib, sys
          errors = []
          for path in sorted(pathlib.Path('.').rglob('*.yaml')):
              if '.git' in path.parts:
                  continue
              try:
                  yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as e:
                  errors.append(f"YAML ERROR {path}: {e}")
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          count = len([p for p in pathlib.Path('.').rglob('*.yaml') if '.git' not in p.parts])
          print(f"OK: {count} archivos YAML validos")
          PY

  validate-catalog:
    name: Verify dist/catalog.json is up to date (D2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml --quiet

      - name: Regenerate catalog and check for diff
        run: |
          python3 .github/scripts/build_catalog.py
          git diff --exit-code dist/catalog.json || (
            echo ""
            echo "ERROR: dist/catalog.json está desactualizado."
            echo "Ejecuta: python3 .github/scripts/build_catalog.py"
            echo "y haz commit del resultado."
            exit 1
          )

  validate-profiles-structure:
    name: Validate profile structure and policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml --quiet

      - name: Check required fields and policy (POL_* rules)
        run: |
          python - <<'PY'
          import yaml, pathlib, sys
          errors = []
          warnings = []
          REQUIRED = ['id', 'name', 'schema_version', 'status', 'document_class',
                      'latex_engine', 'bibliography_backend', 'bibliography_style', 'sections']
          for path in sorted(pathlib.Path('.').rglob('profile.yaml')):
              if '.git' in path.parts or 'profile_samples' in path.parts:
                  continue
              try:
                  p = yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as e:
                  errors.append(f"PARSE ERROR {path}: {e}")
                  continue
              for field in REQUIRED:
                  if field not in p:
                      errors.append(f"MISSING FIELD '{field}' in {path}")
              status = p.get('status', '')
              ver = p.get('verification') or {}
              if status in ('reviewed', 'verified'):
                  # POL_REVIEWED_NO_SOURCE_URLS
                  if not ver.get('source_urls'):
                      errors.append(f"POL_REVIEWED_NO_SOURCE_URLS: {path}")
                  # POL_REVIEWED_NO_DATE
                  if not ver.get('reviewed_at') and not ver.get('verified_at'):
                      errors.append(f"POL_REVIEWED_NO_DATE: {path}")
                  # POL_REVIEWED_NO_INTERVAL
                  if not ver.get('review_interval_days'):
                      warnings.append(f"POL_REVIEWED_NO_INTERVAL (warning): {path}")
              if status == 'verified':
                  # POL_VERIFIED_NO_VERIFIED_AT
                  if not ver.get('verified_at'):
                      errors.append(f"POL_VERIFIED_NO_VERIFIED_AT: {path}")
                  # POL_VERIFIED_NO_VERIFIED_BY
                  if not ver.get('verified_by'):
                      errors.append(f"POL_VERIFIED_NO_VERIFIED_BY: {path}")
          for w in warnings:
              print(f"WARN: {w}")
          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)
          count = len([p for p in pathlib.Path('.').rglob('profile.yaml')
                       if '.git' not in p.parts and 'profile_samples' not in p.parts])
          print(f"OK: {count} perfiles validos")
          PY

  compile-sample-us-mit-ieee:
    name: P3 — Compile us_mit_ieee sample project with LaTeX
    runs-on: ubuntu-latest
    # Solo ejecutar en main/master para ahorrar minutos de CI en PRs de baja prioridad
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      # ── Instalar TeX Live con paquetes requeridos por us_mit_ieee (IEEE + APA) ──
      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            texlive-xetex \
            texlive-bibtex-extra \
            texlive-latex-recommended \
            texlive-publishers \
            texlive-science \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-spanish \
            biber \
            latexmk \
            poppler-utils
          # Verificar explícitamente los paquetes que TeXisStudio genera siempre.
          for sty in \
            fontspec.sty \
            geometry.sty \
            graphicx.sty \
            booktabs.sty \
            longtable.sty \
            caption.sty \
            setspace.sty \
            microtype.sty \
            csquotes.sty \
            hyperref.sty \
            listings.sty \
            algorithm.sty \
            algpseudocode.sty \
            biblatex.sty
          do
            kpsewhich "$sty" >/dev/null || { echo "ERROR: $sty no encontrado en TeX Live"; exit 1; }
          done
          # Verificar estilos biblatex necesarios para IEEE
          kpsewhich ieee.bbx >/dev/null || { echo "ERROR: ieee.bbx no encontrado — instala texlive-publishers"; exit 1; }

      # ── Instalar Rust para compilar texis-cli ──
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # El código fuente de TeXisStudio-main está embebido en profile_samples como referencia
      # Para compilar necesitamos el repo principal — lo clonamos en un directorio temporal
      - name: Clone TeXisStudio main repo
        uses: actions/checkout@v4
        with:
          repository: GonzaloAndDev/TeXisStudio
          path: _texis_main
          # Si el repo es privado, añadir: token: ${{ secrets.GH_PAT }}

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            _texis_main/target/
          key: ${{ runner.os }}-cargo-texis-main-${{ hashFiles('_texis_main/**/Cargo.lock', '_texis_main/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-texis-main-

      - name: Build texis-cli
        working-directory: _texis_main
        run: cargo build --release -p texis-cli

      - name: Validate sample project structure
        run: |
          SAMPLE=profile_samples/us_mit_ieee
          if [ ! -f "$SAMPLE/project.texis/tesis.project.yaml" ]; then
            echo "ERROR: tesis.project.yaml no encontrado en $SAMPLE/project.texis"
            exit 1
          fi
          echo "OK: estructura del sample us_mit_ieee verificada"

      - name: Generate LaTeX and compile
        run: |
          TEXIS=_texis_main/target/release/texis
          SAMPLE=profile_samples/us_mit_ieee/project.texis
          $TEXIS compile "$SAMPLE" --backend latexmk || {
            echo "--- LaTeX build log ---"
            cat "$SAMPLE/build/main.log" 2>/dev/null | tail -60 || echo "(no build log)"
            exit 1
          }
          echo "OK: compilación completada"

      - name: Run postflight (pdfinfo + pdffonts)
        run: |
          PDF=profile_samples/us_mit_ieee/project.texis/build/main.pdf
          if [ ! -f "$PDF" ]; then
            echo "ERROR: PDF no generado en $PDF"
            exit 1
          fi
          pdfinfo "$PDF"
          pdffonts "$PDF"
          echo "OK: postflight PDF aprobado"

      - name: Upload compiled PDF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: us_mit_ieee_compiled_pdf
          path: profile_samples/us_mit_ieee/project.texis/build/main.pdf
          if-no-files-found: warn

  validate-sample-projects:
    name: Validate sample project structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml --quiet

      - name: Validate sample project YAML and structure
        run: |
          python - <<'PY'
          import yaml, json, pathlib, sys
          errors = []
          samples_dir = pathlib.Path('profile_samples')
          if not samples_dir.exists():
              print("OK: no sample projects directory (skipping)")
              sys.exit(0)
          for sample in sorted(samples_dir.iterdir()):
              if not sample.is_dir():
                  continue
              project_dir = sample / 'project.texis'
              project_yaml = project_dir / 'tesis.project.yaml'
              checklist = sample / 'expected_checklist.json'
              if not project_yaml.exists():
                  errors.append(f"MISSING tesis.project.yaml in {sample}")
                  continue
              if not checklist.exists():
                  errors.append(f"MISSING expected_checklist.json in {sample}")
              try:
                  p = yaml.safe_load(project_yaml.read_text(encoding='utf-8'))
              except Exception as e:
                  errors.append(f"YAML ERROR in {project_yaml}: {e}")
                  continue
              for field in ['schema_version', 'profile_id', 'metadata', 'sections']:
                  if field not in p:
                      errors.append(f"MISSING '{field}' in {project_yaml}")
              if checklist.exists():
                  try:
                      json.loads(checklist.read_text(encoding='utf-8'))
                  except Exception as e:
                      errors.append(f"JSON ERROR in {checklist}: {e}")
              print(f"  OK: {sample.name} (profile_id={p.get('profile_id','?')}, "
                    f"sections={len(p.get('sections', []))})")
          if errors:
              for e in errors:
                  print(f"ERROR: {e}")
              sys.exit(1)
          count = sum(1 for s in samples_dir.iterdir() if s.is_dir())
          print(f"OK: {count} sample project(s) valid")
          PY
