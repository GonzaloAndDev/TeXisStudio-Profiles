schema_version: "1.0.0"
id: cl_uchile_apa7
name: "U. de Chile - Tesis (APA 7)"
status: reviewed
latex_engine: xelatex
compiler: latexmk
bibliography_backend: biber
bibliography_style: apa

# ── Verificación contra guías oficiales ──────────────────────────
# Revisado el 2026-05-25 contra los Reglamentos de Postgrado de la
# Universidad de Chile y las directrices de la VID (Vicerrectoría de
# Investigación y Desarrollo).
verification:
  reviewed_at: "2026-05-25"
  reviewed_by: "TeXisStudio Community"
  verified_at: "2026-05-25"
  verified_by: "TeXisStudio Community — revisado contra Reglamentos de Postgrado UChile y VID"
  source_urls:
    - "https://www.uchile.cl/postgrado"
    - "https://www.vid.uchile.cl/"
  review_interval_days: 365

# ── Formato de página ─────────────────────────────────────────────
# Universidad de Chile: A4, márgenes estándar LATAM.
# Interlineado: 1.5. Fuente: Times New Roman 12pt.
document_class:
  name: book
  options:
    - 12pt
    - a4paper
    - oneside

page_layout:
  paper: a4paper
  margins:
    top: 25mm
    bottom: 25mm
    left: 30mm
    right: 25mm
  line_spacing: 1.5

max_abstract_words: 350

packages: []

sections:
  - id: portada
    element_id: cover
    placement: front_matter
    required: true
    title: "Portada"
    guidance: |
      La portada oficial de la U. de Chile incluye:
      • Logotipo y nombre de la Universidad de Chile.
      • Facultad e Instituto o Departamento.
      • Título completo de la tesis.
      • "TESIS para optar al grado de Doctor en [campo]."
      • Nombre del autor/a.
      • Profesor/a Guía (director/a de tesis) y co-guía (si aplica).
      • Santiago, Chile, [Mes] [Año].
      Verifica el formato con la Coordinación de Doctorado de tu Facultad.

  - id: declaracion
    element_id: declaration
    placement: front_matter
    required: true
    title: "Declaración de Autoría"
    guidance: |
      Declaración de originalidad requerida por la U. de Chile.
      La Unidad de Postgrado puede exigir un acta firmada por el Comité Académico.

  - id: resumen
    element_id: abstract
    placement: front_matter
    required: true
    title: "Resumen"
    guidance: |
      Resumen en español, 200–350 palabras.
      Problema, objetivos, metodología, resultados y conclusiones.
      Palabras clave (4–6).

  - id: abstract_ingles
    element_id: abstract_en
    placement: front_matter
    required: false
    title: "Abstract"
    guidance: Abstract en inglés. Recomendado. Máximo 350 palabras. Keywords (4–6).

  - id: agradecimientos
    element_id: acknowledgements
    placement: front_matter
    required: false
    title: "Agradecimientos"
    guidance: |
      Reconoce al profesor/a guía, Comité Académico, becas ANID
      (ex-CONICYT: FONDECYT, FONDEF, Becas Chile) — incluye número de proyecto o beca.
      También fondos UCH como VID-FONDAP o proyectos de la Vicerrectoría.

  - id: dedicatoria
    element_id: dedication
    placement: front_matter
    required: false
    title: "Dedicatoria"
    guidance: Opcional. Una o tres líneas. Sin encabezado impreso.

  - id: indice
    element_id: toc
    placement: front_matter
    required: true
    title: "Índice General"
    guidance: Generado automáticamente. Números de página exactos.

  - id: indice_figuras
    element_id: list_of_figures
    placement: front_matter
    required: false
    title: "Índice de Figuras"
    guidance: Activa si tienes 5 o más figuras.

  - id: indice_tablas
    element_id: list_of_tables
    placement: front_matter
    required: false
    title: "Índice de Tablas"
    guidance: Activa si tienes 5 o más tablas.

  - id: introduccion
    element_id: introduction
    placement: body
    required: true
    title: "Introducción"
    label: "capitulo:introduccion"
    guidance: |
      Contextualización, planteamiento del problema, justificación,
      preguntas de investigación, objetivos, hipótesis y estructura.
      APA 7: (Autor, año) en el texto.

  - id: marco_teorico
    element_id: literature_review
    placement: body
    required: true
    title: "Marco Teórico"
    label: "capitulo:marcoteorico"
    guidance: Revisión crítica organizada por temas. Identifica el vacío de la tesis.

  - id: metodologia
    element_id: methodology
    placement: body
    required: true
    title: "Metodología"
    label: "capitulo:metodologia"
    guidance: |
      Diseño, muestra, instrumentos, procedimiento, análisis.
      Aprobación del Comité de Ética de Investigación en Seres Humanos (CEISH)
      si corresponde.

  - id: resultados
    element_id: results
    placement: body
    required: true
    title: "Resultados"
    label: "capitulo:resultados"
    guidance: Hallazgos objetivos. Tablas y figuras APA 7.

  - id: discusion
    element_id: discussion
    placement: body
    required: false
    title: "Discusión"
    label: "capitulo:discusion"
    guidance: Interpretación, comparación con literatura, implicaciones y limitaciones.

  - id: conclusiones
    element_id: conclusions
    placement: body
    required: true
    title: "Conclusiones"
    label: "capitulo:conclusiones"
    guidance: Responde objetivos, aportaciones, limitaciones y trabajo futuro.

  - id: referencias
    element_id: bibliography
    placement: back_matter
    required: true
    title: "Referencias"
    guidance: APA 7ª edición, lista alfabética, sangría francesa.

  - id: apendices
    element_id: appendix
    placement: back_matter
    required: false
    title: "Apéndices"
    guidance: Instrumentos, datos adicionales, dictamen ético. Apéndice A, B…
