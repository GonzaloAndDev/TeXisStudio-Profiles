schema_version: "1.0.0"
id: mx_tec_apa7
name: "Tec de Monterrey - Tesis (APA 7)"
status: experimental
latex_engine: xelatex
compiler: "latexmk"
document_class:
  name: book
  options: [12pt, letterpaper, oneside]
bibliography_backend: biber
bibliography_style: apa
page_layout:
  paper: letterpaper
  margins:
    top: 25.4mm
    bottom: 25.4mm
    left: 30mm
    right: 25.4mm
  line_spacing: 2.0
packages: []
sections:
  - id: portada
    element_id: cover
    placement: front_matter
    required: true
    title: Portada
  - id: declaracion
    element_id: declaration
    placement: front_matter
    required: true
    title: "Declaracion de Autenticidad"
  - id: resumen
    element_id: abstract
    placement: front_matter
    required: true
    title: Resumen
  - id: abstract
    element_id: abstract_en
    placement: front_matter
    required: false
    title: Abstract
  - id: agradecimientos
    element_id: acknowledgements
    placement: front_matter
    required: false
    title: Agradecimientos
  - id: introduccion
    element_id: chapter
    placement: body
    required: true
    title: "Introduccion"
  - id: marco_teorico
    element_id: chapter
    placement: body
    required: true
    title: "Marco Teorico"
  - id: metodologia
    element_id: chapter
    placement: body
    required: true
    title: Metodologia
  - id: resultados
    element_id: chapter
    placement: body
    required: true
    title: Resultados
  - id: conclusiones
    element_id: chapter
    placement: body
    required: true
    title: Conclusiones
  - id: referencias
    element_id: bibliography
    placement: back_matter
    required: true
    title: Referencias
  - id: apendices
    element_id: appendix
    placement: back_matter
    required: false
    title: "Apendices"
