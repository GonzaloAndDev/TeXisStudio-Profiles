schema_version: "1.0.0"
id: mx_uanl_apa7
name: "UANL - Tesis (APA 7)"
status: reviewed
latex_engine: xelatex
compiler: latexmk
bibliography_backend: biber
bibliography_style: apa

# ── Verificación contra guías oficiales ──────────────────────────
# Revisado el 2026-05-25 contra lineamientos de la Dirección de Estudios
# de Posgrado de la Universidad Autónoma de Nuevo León.
verification:
  verified_at: "2026-05-25"
  verified_by: "TeXisStudio Community — revisado contra lineamientos Posgrado UANL"
  source_urls:
    - "https://www.uanl.mx/posgrado/"
    - "https://www.uanl.mx/tramites/titulacion/"
  review_interval_days: 365

document_class:
  name: book
  options:
    - 12pt
    - letterpaper
    - oneside

page_layout:
  paper: letterpaper
  margins:
    top: 25mm
    bottom: 25mm
    left: 30mm
    right: 20mm
  line_spacing: 1.5

max_abstract_words: 350

packages: []

sections:
  - id: portada
    element_id: cover
    placement: front_matter
    required: true
    title: "Portada"
    guidance: |
      Portada oficial UANL. Incluye:
      • Escudo y nombre de la UANL.
      • Nombre de la Facultad o División de Posgrado.
      • Título de la tesis.
      • "TESIS en opción al grado de [Maestro/Doctor] en [Programa]."
      • Nombre del autor.
      • Director de tesis.
      • San Nicolás de los Garza, N.L., [Mes] [Año].
      Verifica el formato específico de portada con la Dirección de Posgrado de tu Facultad.

  - id: declaracion
    element_id: declaration
    placement: front_matter
    required: true
    title: "Declaración de Autenticidad"
    guidance: |
      Declaración de originalidad requerida por la UANL.
      Algunas facultades requieren carta adicional firmada por el director.

  - id: resumen
    element_id: abstract
    placement: front_matter
    required: true
    title: "Resumen"
    guidance: |
      Resumen en español, 200–350 palabras.
      Problema, objetivo, método, resultados y conclusión principal.
      Palabras clave (4–6).

  - id: abstract_ingles
    element_id: abstract_en
    placement: front_matter
    required: false
    title: "Abstract"
    guidance: Abstract en inglés. Recomendado. Máximo 350 palabras. Keywords (4–6).

  - id: agradecimientos
    element_id: acknowledgements
    placement: front_matter
    required: false
    title: "Agradecimientos"
    guidance: |
      Reconoce al director de tesis, sinodales, becas CONAHCYT y proyectos
      PAICYT (Programa de Apoyo a la Investigación Científica y Tecnológica UANL).

  - id: indice
    element_id: toc
    placement: front_matter
    required: true
    title: "Índice General"
    guidance: Generado automáticamente. Números de página exactos.

  - id: indice_figuras
    element_id: list_of_figures
    placement: front_matter
    required: false
    title: "Índice de Figuras"
    guidance: Activa si tienes 5 o más figuras.

  - id: indice_tablas
    element_id: list_of_tables
    placement: front_matter
    required: false
    title: "Índice de Tablas"
    guidance: Activa si tienes 5 o más tablas.

  - id: introduccion
    element_id: introduction
    placement: body
    required: true
    title: "Introducción"
    label: "capitulo:introduccion"
    guidance: |
      Contextualización, planteamiento del problema, justificación,
      preguntas de investigación, objetivos e hipótesis. Estructura de la tesis.

  - id: marco_teorico
    element_id: literature_review
    placement: body
    required: true
    title: "Marco Teórico"
    label: "capitulo:marcoteorico"
    guidance: |
      Revisión crítica de la literatura y fundamentos conceptuales.
      Organiza por temas. Identifica el vacío. APA 7: (Autor, año).

  - id: metodologia
    element_id: methodology
    placement: body
    required: true
    title: "Metodología"
    label: "capitulo:metodologia"
    guidance: Diseño, muestra, instrumentos, procedimiento, análisis y ética.

  - id: resultados
    element_id: results
    placement: body
    required: true
    title: "Resultados"
    label: "capitulo:resultados"
    guidance: Hallazgos objetivos. Tablas y figuras APA 7. Sin interpretación.

  - id: discusion
    element_id: discussion
    placement: body
    required: false
    title: "Discusión"
    label: "capitulo:discusion"
    guidance: Interpretación, comparación con literatura, implicaciones y limitaciones.

  - id: conclusiones
    element_id: conclusions
    placement: body
    required: true
    title: "Conclusiones"
    label: "capitulo:conclusiones"
    guidance: Responde preguntas, resume aportaciones, limitaciones y trabajo futuro.

  - id: referencias
    element_id: bibliography
    placement: back_matter
    required: true
    title: "Referencias"
    guidance: APA 7ª edición, lista alfabética, sangría francesa.

  - id: apendices
    element_id: appendix
    placement: back_matter
    required: false
    title: "Apéndices"
    guidance: Materiales complementarios. Etiqueta Apéndice A, B…
