schema_version: "1.0.0"
id: us_mit_ieee
name: "MIT - Thesis (IEEE)"
status: reviewed
latex_engine: xelatex
compiler: latexmk
bibliography_backend: biber
bibliography_style: ieee

# ── Verificación contra guías oficiales ──────────────────────────
# Revisado el 2026-05-25 contra el MIT Thesis Preparation Guide.
# Revisar anualmente — MIT Libraries actualiza las especificaciones.
verification:
  verified_at: "2026-05-25"
  verified_by: "TeXisStudio Community — revisado contra MIT Thesis Preparation Guide"
  source_urls:
    - "https://libraries.mit.edu/distinctive-collections/thesis-specs/"
    - "https://libguides.mit.edu/cite-write/thesis"
  review_interval_days: 365

# ── Formato de página ─────────────────────────────────────────────
# Fuente: MIT Thesis Preparation Guide — MIT Libraries.
# Left margin 1.5" (38.1mm) for binding; top, right, bottom 1" (25.4mm).
# Double spacing required (single acceptable in some departments for final).
# Font: 10–12pt. Standard is 12pt Times New Roman or equivalent serif.
document_class:
  name: book
  options:
    - 12pt
    - letterpaper
    - oneside

page_layout:
  paper: letterpaper
  margins:
    top: 25.4mm
    bottom: 25.4mm
    left: 38.1mm
    right: 25.4mm
  line_spacing: 2.0

# ── Límites de palabras ───────────────────────────────────────────
# MIT does not set a universal word limit. Typical PhD dissertations:
# Engineering/CS: 80–150 pages (~20,000–50,000 words body text).
# Abstract: submitted separately to MIT Libraries; guideline ≤ 350 words.
max_abstract_words: 350

packages: []

sections:
  # ── Front matter ─────────────────────────────────────────────────
  - id: title_page
    element_id: cover
    placement: front_matter
    required: true
    title: "Title Page"
    guidance: |
      Auto-generated from project metadata. MIT title page must include:
      • Full thesis title.
      • Author's full name (as registered at MIT).
      • "Submitted to the Department of [X] in partial fulfillment of the requirements
        for the degree of [Doctor of Philosophy / Master of Science] in [Field]."
      • "at the MASSACHUSETTS INSTITUTE OF TECHNOLOGY"
      • Month and Year (e.g., "June 2026").
      • "© [Year] Massachusetts Institute of Technology. All rights reserved."
      The signature page (committee approval) is handled separately by MIT.

  - id: abstract
    element_id: abstract_en
    placement: front_matter
    required: true
    title: Abstract
    guidance: |
      MIT abstract requirements:
      • Submitted separately to MIT Libraries (DSpace) and ProQuest.
      • Maximum 350 words recommended (ProQuest limit: 350 for PhD, 150 for Master's).
      • Must be in English.
      • Cover: research problem, method, key results, significance.
      • No citations, no figures, no undefined acronyms.
      The abstract appears both in the thesis and in the MIT Libraries catalog —
      write it as a standalone piece that will be read out of context.

  - id: acknowledgements
    element_id: acknowledgements
    placement: front_matter
    required: false
    title: Acknowledgements
    guidance: |
      Acknowledge: thesis advisor, committee members, collaborators,
      and funding agencies (required — include grant/contract numbers).
      Common funding acknowledgement formats:
      • NSF: "This work was supported by the National Science Foundation under Grant No. [X]."
      • DARPA, DOE, NIH: use the specific language required by each agency.
      Typical length: half to one page.

  - id: table_of_contents
    element_id: toc
    placement: front_matter
    required: true
    title: "Table of Contents"
    guidance: |
      Auto-generated from your section headings.
      MIT requires a complete Table of Contents with accurate page numbers.
      Depth: list chapters and major sections (up to level 2–3 headings).

  - id: list_of_figures
    element_id: list_of_figures
    placement: front_matter
    required: false
    title: "List of Figures"
    guidance: |
      Required by many MIT departments if figures exceed 5. Auto-generated.
      Each entry: figure number, caption (abbreviated if long), page number.

  - id: list_of_tables
    element_id: list_of_tables
    placement: front_matter
    required: false
    title: "List of Tables"
    guidance: |
      Required if tables exceed 5. Auto-generated from table captions.

  # ── Body ──────────────────────────────────────────────────────────
  - id: introduction
    element_id: introduction
    placement: body
    required: true
    title: "Introduction"
    label: "chapter:introduction"
    guidance: |
      The introduction must motivate the work and establish its scope:
      1. Problem context: what is the technical or scientific challenge?
      2. Motivation: why does it matter? (Applications, open questions, limitations of prior art.)
      3. Related work summary: brief overview — full treatment in the next chapter.
      4. Thesis statement: explicit statement of the contribution.
      5. Thesis organization: outline of chapters.
      IEEE style: citations are numeric [1], [2] in order of first appearance.
      In engineering at MIT, the introduction should be precise and technically grounded
      from the first paragraph — committees expect depth, not accessibility.
      Length: 10–20 pages.

  - id: background
    element_id: theoretical_framework
    placement: body
    required: true
    title: "Background and Related Work"
    label: "chapter:background"
    guidance: |
      Cover the technical foundations and prior art:
      • Background: define key concepts, mathematical notation, models, and frameworks
        the reader needs to understand the contribution. Be precise — the committee
        will evaluate your mastery of the field.
      • Related work: compare your approach to the most relevant prior work.
        Organize by approach (not by author): clustering methods, learning-based methods, etc.
      • Clearly identify what prior work does NOT do, or where it fails — this is the gap.
      • Every significant claim needs a citation [X]. Use the DOI importer for IEEE papers.
      MIT CS/EE dissertations: cite arXiv, ACM DL, IEEE Xplore, NIPS proceedings.

  - id: methodology
    element_id: methodology
    placement: body
    required: true
    title: "Proposed Approach / Methodology"
    label: "chapter:methodology"
    guidance: |
      Describe the technical approach in full detail:
      • Problem formulation: formal definition of the problem (mathematical notation where applicable).
      • System architecture or algorithm design.
      • Key design decisions and their justification.
      • Theoretical analysis: complexity, convergence, bounds (if applicable).
      • Implementation details relevant to correctness (not exhaustive code listings — those go in Appendices).
      The description must be complete enough for an expert reader to reproduce the work.
      MIT expects rigorous technical writing: use equations, pseudocode, diagrams as needed.

  - id: experiments
    element_id: experimentation
    placement: body
    required: true
    title: "Experimental Evaluation"
    label: "chapter:experiments"
    guidance: |
      Experimental rigor is critical at MIT. This chapter must:
      • Describe the experimental setup fully: hardware (GPU model, CPU, memory), datasets,
        baselines, evaluation metrics, and hyperparameters.
      • Present ablation studies to justify each major design decision.
      • Compare against the strongest baselines — cherry-picking baselines is a serious deficiency.
      • Report results with statistical significance: mean ± std, confidence intervals where applicable.
      • Include failure cases and analysis — committees respect honest evaluation.
      Figures: use vector graphics (PDF) for plots. Tables: use booktabs style (already included).
      IEEE format: refer to figures as "Fig. X" in text.

  - id: discussion
    element_id: discussion
    placement: body
    required: false
    title: "Discussion"
    label: "chapter:discussion"
    guidance: |
      Analyze what the results mean beyond the numbers:
      • Why does the proposed method work? Provide intuition or theoretical support.
      • Where does it fail, and why?
      • Implications for the broader field or for applications.
      • How does performance scale with data/compute/problem size?
      In many MIT engineering dissertations, Discussion is merged with Results or Conclusion.
      Activate as a separate chapter if the analysis is substantial.

  - id: conclusion
    element_id: conclusions
    placement: body
    required: true
    title: "Conclusion and Future Work"
    label: "chapter:conclusion"
    guidance: |
      Close with precision:
      • Restate the thesis contributions — what the field now knows that it did not.
      • Summarize the experimental evidence for each contribution.
      • Limitations: be specific and honest.
      • Future work: concrete next steps tied directly to your limitations and open questions.
        Avoid vague "future work includes applying this to other domains."
      MIT dissertations are often the foundation for journal publications — the committee
      will ask about publication plans; address this briefly here.
      Length: 5–15 pages.

  # ── Back matter ──────────────────────────────────────────────────
  - id: references
    element_id: bibliography
    placement: back_matter
    required: true
    title: References
    guidance: |
      IEEE numbered bibliography: entries appear in order of first citation.
      Auto-generated from your .bib file at compilation.
      MIT expects complete citations for all referenced work. Include:
      • For journal papers: author(s), title, journal, vol., no., pp., month year, DOI.
      • For conference papers: author(s), title, conference name, city, year, pp., DOI.
      • For arXiv: include the arXiv ID and access date.
      Use the DOI importer to get properly formatted IEEE entries from Crossref.
      Typical PhD dissertation: 100–300 references.

  - id: appendices
    element_id: appendix
    placement: back_matter
    required: false
    title: Appendices
    guidance: |
      Place technical details that would interrupt the main narrative:
      • Extended proofs or derivations.
      • Full algorithm listings or pseudocode.
      • Additional experimental results (ablations, additional datasets).
      • Dataset documentation or preprocessing pipelines.
      • Code availability: if you are releasing code, include the URL or repository info.
      MIT DSpace requires electronic submission — if you include large datasets,
      consider supplementary materials rather than embedding in the PDF.
      Label: Appendix A, B… with descriptive titles; reference from the main text.
