schema_version: "0.1.0"
id: "apa.basic"
name: "APA básico"
description: "Perfil simplificado para trabajos académicos con estilo APA 7 estricto. Ideal para reportes, ensayos y artículos cortos."
author: "Gonzalo Andrade Estrella"
version: "0.1.0"
license: "AGPL-3.0"
tags:
  - apa
  - reporte
  - ensayo
  - articulo
  - licenciatura

document_class:
  name: "article"
  options:
    - "12pt"
    - "letterpaper"

latex_engine: "xelatex"
compiler: "latexmk"
bibliography_backend: "biber"
bibliography_style: "apa"

packages:
  - "fontspec"
  - "geometry"
  - "graphicx"
  - "booktabs"
  - "csquotes"
  - "setspace"
  - "hyperref"

sections:
  - id: "title_page"
    element_id: "title_page"
    placement: "front_matter"
    required: true
    title: null

  - id: "abstract_es"
    element_id: "abstract_es"
    placement: "front_matter"
    required: false
    title: "Resumen"

  - id: "introduction"
    element_id: "introduction"
    placement: "body"
    required: true
    title: "Introducción"
    label: "sec:introduccion"

  - id: "development"
    element_id: "theoretical_framework"
    placement: "body"
    required: true
    title: "Desarrollo"
    label: "sec:desarrollo"

  - id: "conclusions"
    element_id: "conclusions"
    placement: "body"
    required: true
    title: "Conclusiones"
    label: "sec:conclusiones"

  - id: "references"
    element_id: "references"
    placement: "back_matter"
    required: true
    title: "Referencias"
