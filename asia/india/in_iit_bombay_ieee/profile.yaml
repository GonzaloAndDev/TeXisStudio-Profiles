id: in_iit_bombay_ieee
name: "IIT Bombay - Thesis (IEEE)"
latex_engine: xelatex
document_class:
  name: book
  options: [12pt, a4paper, oneside]
bibliography_backend: biber
bibliography_style: ieee
page_layout:
  paper: a4paper
  margins:
    top: 25mm
    bottom: 25mm
    left: 35mm
    right: 25mm
  line_spacing: 1.5
sections:
  - id: title_page
    element_id: cover
    placement: front_matter
    required: true
    title: "Title Page"
  - id: abstract
    element_id: abstract
    placement: front_matter
    required: true
    title: Abstract
  - id: acknowledgements
    element_id: acknowledgements
    placement: front_matter
    required: false
    title: Acknowledgements
  - id: table_of_contents
    element_id: toc
    placement: front_matter
    required: true
    title: "Table of Contents"
  - id: introduction
    element_id: chapter
    placement: body
    required: true
    title: Introduction
  - id: literature_review
    element_id: chapter
    placement: body
    required: true
    title: "Literature Review"
  - id: methodology
    element_id: chapter
    placement: body
    required: true
    title: Methodology
  - id: results
    element_id: chapter
    placement: body
    required: true
    title: Results
  - id: discussion
    element_id: chapter
    placement: body
    required: true
    title: Discussion
  - id: conclusion
    element_id: chapter
    placement: body
    required: true
    title: Conclusion
  - id: references
    element_id: bibliography
    placement: back_matter
    required: true
    title: References
  - id: appendices
    element_id: appendix
    placement: back_matter
    required: false
    title: Appendices
