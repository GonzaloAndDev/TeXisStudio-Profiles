schema_version: "0.1.0"
id: "generic.thesis"
name: "Tesis genérica"
description: "Perfil base para tesis de licenciatura, maestría y doctorado. Clase book, XeLaTeX, biber, APA 7."
author: "Gonzalo Andrade Estrella"
version: "0.1.0"
license: "AGPL-3.0"
tags:
  - tesis
  - licenciatura
  - maestria
  - doctorado
  - apa
  - xelatex

document_class:
  name: "book"
  options:
    - "12pt"
    - "letterpaper"
    - "oneside"

latex_engine: "xelatex"
compiler: "latexmk"
bibliography_backend: "biber"
bibliography_style: "apa"

packages:
  - "fontspec"
  - "geometry"
  - "graphicx"
  - "booktabs"
  - "csquotes"
  - "setspace"
  - "hyperref"

sections:
  - id: "title_page"
    element_id: "title_page"
    placement: "front_matter"
    required: true
    title: null

  - id: "table_of_contents"
    element_id: "table_of_contents"
    placement: "front_matter"
    required: true
    title: null

  - id: "abstract_es"
    element_id: "abstract_es"
    placement: "front_matter"
    required: false
    title: "Resumen"

  - id: "abstract_en"
    element_id: "abstract_en"
    placement: "front_matter"
    required: false
    title: "Abstract"

  - id: "dedication"
    element_id: "dedication"
    placement: "front_matter"
    required: false
    title: "Dedicatoria"

  - id: "acknowledgements"
    element_id: "acknowledgements"
    placement: "front_matter"
    required: false
    title: "Agradecimientos"

  - id: "introduction"
    element_id: "introduction"
    placement: "body"
    required: true
    title: "Introducción"
    label: "sec:introduccion"

  - id: "theoretical_framework"
    element_id: "theoretical_framework"
    placement: "body"
    required: false
    title: "Marco Teórico"
    label: "sec:marco"

  - id: "methodology"
    element_id: "methodology"
    placement: "body"
    required: true
    title: "Metodología"
    label: "sec:metodologia"

  - id: "results"
    element_id: "results"
    placement: "body"
    required: true
    title: "Resultados"
    label: "sec:resultados"

  - id: "discussion"
    element_id: "discussion"
    placement: "body"
    required: false
    title: "Discusión"
    label: "sec:discusion"

  - id: "conclusions"
    element_id: "conclusions"
    placement: "body"
    required: true
    title: "Conclusiones"
    label: "sec:conclusiones"

  - id: "references"
    element_id: "references"
    placement: "back_matter"
    required: true
    title: "Referencias"

  - id: "appendices"
    element_id: "appendices"
    placement: "appendix"
    required: false
    title: "Anexos"
