schema_version: "1.0.0"
id: generic_especialidad
name: "Trabajo de Especialidad Genérico"
status: reviewed
latex_engine: xelatex
compiler: latexmk
bibliography_backend: biber
bibliography_style: apa

verification:
  reviewed_at: "2026-05-28"
  reviewed_by: "TeXisStudio Community"
  source_urls:
    - "https://apastyle.apa.org/instructional-aids/student-paper-setup-guide.pdf"
    - "https://apastyle.apa.org/style-grammar-guidelines/paper-format"
  review_interval_days: 365

document_class:
  name: report
  options:
    - 12pt
    - letterpaper
    - oneside

page_layout:
  paper: letterpaper
  margins:
    top: 25mm
    bottom: 25mm
    left: 30mm
    right: 20mm
  line_spacing: 1.5

max_abstract_words: 300

packages: []

sections:
  - id: portada
    element_id: cover
    placement: front_matter
    required: true
    title: "Portada"
    guidance: |
      Incluye institución, programa de especialidad, título del trabajo,
      autor, asesor, ciudad y fecha. Si tu hospital, colegio o programa
      tiene un formato oficial, úsalo como fuente de verdad.

  - id: resumen
    element_id: abstract
    placement: front_matter
    required: true
    title: "Resumen"
    guidance: |
      Resume el problema profesional abordado, el contexto, la estrategia
      de intervención o análisis, los resultados principales y la utilidad
      práctica del trabajo. Longitud sugerida: 150–300 palabras.

  - id: indice
    element_id: toc
    placement: front_matter
    required: true
    title: "Índice"
    guidance: |
      Generado automáticamente. Revisa la paginación final antes de entregar.

  - id: introduccion
    element_id: introduction
    placement: body
    required: true
    title: "Introducción"
    guidance: |
      Presenta el problema profesional o clínico, el contexto institucional,
      la relevancia del trabajo y los objetivos del documento.

  - id: marco_referencial
    element_id: literature_review
    placement: body
    required: true
    title: "Marco Referencial"
    guidance: |
      Sintetiza la normativa, evidencia previa, protocolos, guías clínicas
      o literatura que sustentan el abordaje adoptado.

  - id: metodologia
    element_id: methodology
    placement: body
    required: true
    title: "Metodología / Intervención"
    guidance: |
      Describe el diseño del trabajo, procedimiento, criterios de selección,
      instrumentos, intervención o estrategia aplicada y consideraciones éticas.

  - id: resultados
    element_id: results
    placement: body
    required: true
    title: "Resultados"
    guidance: |
      Expón los hallazgos, productos, métricas, evaluación o resultados
      observados del trabajo de especialidad.

  - id: discusion
    element_id: discussion
    placement: body
    required: false
    title: "Discusión"
    guidance: |
      Interpreta los resultados, compara con literatura o estándares,
      reconoce limitaciones y señala implicaciones prácticas.

  - id: conclusiones
    element_id: conclusions
    placement: body
    required: true
    title: "Conclusiones y Recomendaciones"
    guidance: |
      Resume el aporte profesional del trabajo, su utilidad aplicada y
      recomendaciones para continuidad o mejora.

  - id: referencias
    element_id: bibliography
    placement: back_matter
    required: true
    title: "Referencias"
    guidance: |
      Lista final de referencias en APA 7. Incluye solo las fuentes citadas.

  - id: anexos
    element_id: appendix
    placement: back_matter
    required: false
    title: "Anexos"
    guidance: |
      Material complementario: instrumentos, protocolos, formatos, tablas
      extensas o documentación técnica de apoyo.
