  - id: resumen
    element_id: abstract
    title: "Resumen"
    placement: front_matter
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: res-p1
        content: >
          El despliegue de modelos de inteligencia artificial en dispositivos
          con recursos computacionales limitados representa uno de los desafíos
          centrales del área de edge computing. Esta tesis propone y evalúa un
          esquema de compresión y cuantización para redes neuronales
          convolucionales (CNNs) orientado a la clasificación de imágenes
          médicas en entornos embebidos. Partiendo de una arquitectura
          MobileNetV3 preentrenada en ImageNet, se aplican técnicas de poda
          estructurada y cuantización dinámica de 8 bits para obtener modelos
          con hasta un 78\% de reducción en parámetros, manteniendo una pérdida
          de exactitud inferior al 2\% en el conjunto de datos CheXpert
          (radiografías de tórax, $n = 224{,}316$). Los modelos comprimidos
          alcanzan tiempos de inferencia de 38 ms en Raspberry Pi 4, lo que
          los hace viables para sistemas de diagnóstico de primer nivel en
          comunidades con infraestructura limitada.
    fields: {}
    children: []

  - id: abstract_ingles
    element_id: abstract_en
    title: "Abstract"
    placement: front_matter
    required: false
    enabled: true
    blocks:
      - type: paragraph
        id: abs-p1
        content: >
          Deploying artificial intelligence models on resource-constrained devices
          is a central challenge in edge computing. This thesis proposes and evaluates
          a compression and quantization scheme for convolutional neural networks
          (CNNs) targeted at medical image classification in embedded environments.
          Starting from a MobileNetV3 architecture pretrained on ImageNet, we apply
          structured pruning and dynamic 8-bit quantization to obtain models with
          up to 78\% parameter reduction while maintaining accuracy loss below 2\%
          on the CheXpert dataset (chest X-rays, $n = 224{,}316$). Compressed models
          achieve 38 ms inference on Raspberry Pi 4, making them viable for first-level
          diagnostic systems in underserved communities.
    fields: {}
    children: []

