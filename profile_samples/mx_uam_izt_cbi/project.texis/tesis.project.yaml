  - id: abstract_es
    element_id: abstract_es
    title: "Resumen"
    placement: front_matter
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: res-p1
        content: >
          La integración masiva de fuentes de generación distribuida basadas en
          energías renovables impone retos técnicos importantes a los sistemas
          de potencia modernos. La naturaleza intermitente y no lineal de estas
          fuentes requiere estrategias de control robustas que garanticen
          estabilidad ante perturbaciones y variaciones paramétricas. En este
          trabajo se propone un esquema de control adaptativo por modos
          deslizantes (AMD) para microrredes de corriente alterna con integración
          de generación fotovoltaica y eólica. Se demuestra la estabilidad
          asintótica del sistema en lazo cerrado mediante la teoría de Lyapunov
          y se valida el desempeño mediante simulaciones en MATLAB/Simulink
          comparadas con el control PID convencional. Los resultados muestran
          una reducción del 42\% en el tiempo de establecimiento y una mejora
          del 28\% en el rechazo de perturbaciones.
    fields: {}
    children: []

  - id: abstract_en
    element_id: abstract_en
    title: "Abstract"
    placement: front_matter
    required: false
    enabled: true
    blocks:
      - type: paragraph
        id: abs-p1
        content: >
          The massive integration of distributed generation sources based on
          renewable energies poses important technical challenges to modern
          power systems. The intermittent and nonlinear nature of these sources
          requires robust control strategies that guarantee stability under
          disturbances and parametric variations. This work proposes an adaptive
          sliding mode control (SMC) scheme for AC microgrids integrating
          photovoltaic and wind generation. Asymptotic stability of the
          closed-loop system is proved via Lyapunov theory and performance
          is validated through MATLAB/Simulink simulations compared against
          conventional PID control. Results show a 42\% reduction in settling
          time and a 28\% improvement in disturbance rejection.
    fields: {}
    children: []

