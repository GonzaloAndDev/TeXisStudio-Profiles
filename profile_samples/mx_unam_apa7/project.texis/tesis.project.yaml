  - id: introduction
    element_id: introduction
    title: "Introducción"
    placement: body
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: intro-p1
        content: >
          Los ecosistemas tropicales de México constituyen uno de los reservorios
          de biodiversidad más importantes del mundo. Sin embargo, el acelerado
          proceso de cambio climático amenaza la estabilidad de estas comunidades
          biológicas y los servicios ecosistémicos que proveen.
      - type: paragraph
        id: intro-p2
        content: >
          Esta investigación se propone caracterizar los efectos ya observados del
          cambio climático en tres ecosistemas tropicales representativos del país,
          así como proyectar los cambios esperados bajo distintos escenarios de
          emisiones de gases de efecto invernadero para el año 2050.
      - type: citation
        id: intro-c1
        citation_key: ipcc2021
        citation_type: parenthetical
        page:
        prefix:
        suffix:
    fields: {}
    children: []

  - id: theoretical_framework
    element_id: theoretical_framework
    title: "Marco Teórico"
    placement: body
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: marco-p1
        content: >
          La biodiversidad puede entenderse como la variedad de formas de vida en
          la Tierra, incluyendo la diversidad genética, de especies y de ecosistemas.
          Los modelos de nicho ecológico permiten proyectar la distribución potencial
          de las especies bajo diferentes escenarios climáticos.
      - type: citation
        id: marco-c1
        citation_key: peterson2011
        citation_type: parenthetical
        page:
        prefix:
        suffix:
      - type: paragraph
        id: marco-p2
        content: >
          Los escenarios de trayectorias socioeconómicas compartidas (SSP) del IPCC
          proporcionan el marco de referencia para modelar los futuros climáticos posibles.
          En este trabajo se utilizan principalmente los escenarios SSP2-4.5 y SSP5-8.5.
      - type: citation
        id: marco-c2
        citation_key: diaz2019
        citation_type: parenthetical
        page:
        prefix:
        suffix:
    fields: {}
    children: []

  - id: methodology
    element_id: methodology
    title: "Metodología"
    placement: body
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: met-p1
        content: >
          Se delimitaron tres polígonos de estudio correspondientes a las regiones
          de los Altos de Chiapas, la Sierra Norte de Oaxaca y la selva mediana de
          Campeche. En cada región se realizaron muestreos estacionales durante 2023
          y 2024 mediante transectos de 500 metros para aves y cuadrantes de 50 m²
          para herpetofauna.
      - type: paragraph
        id: met-p2
        content: >
          Los modelos de nicho ecológico se construyeron con MaxEnt v3.4.4 utilizando
          capas bioclimáticas de CHELSA a resolución de 1 km². Se evaluó el desempeño
          de los modelos mediante curvas ROC y el estadístico AUC.
    fields: {}
    children: []

  - id: results
    element_id: results
    title: "Resultados"
    placement: body
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: res-p1
        content: >
          Se registraron 312 especies de aves, 87 de anfibios y 143 de reptiles en
          las tres regiones de estudio. El análisis temporal indica una reducción
          promedio del 18\% en la riqueza de anfibios entre 2015 y 2024 en las zonas
          de menor altitud (por debajo de los 800 msnm).
      - type: paragraph
        id: res-p2
        content: >
          Los modelos de distribución proyectan que bajo el escenario SSP5-8.5,
          el 34\% de las especies de reptiles estudiadas perderían más del 50\% de
          su área de distribución actual para 2050. Las especies endémicas muestran
          mayor vulnerabilidad que las de distribución amplia.
    fields: {}
    children: []

  - id: discussion
    element_id: discussion
    title: "Discusión"
    placement: body
    required: false
    enabled: true
    blocks:
      - type: paragraph
        id: disc-p1
        content: >
          Los resultados concuerdan con las tendencias globales reportadas por el IPCC
          y con estudios previos en otras regiones tropicales de Latinoamérica. La
          reducción en la diversidad de herpetofauna es consistente con el fenómeno
          de desecación de charcas temporales asociado al aumento de temperaturas.
    fields: {}
    children: []

  - id: conclusions
    element_id: conclusions
    title: "Conclusiones"
    placement: body
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: conc-p1
        content: >
          Los ecosistemas tropicales mexicanos están experimentando cambios
          significativos atribuibles al cambio climático. La reducción en la riqueza
          de anfibios y el desplazamiento altitudinal de las comunidades de aves
          confirman las predicciones de los modelos climáticos para la región.
          La implementación urgente de corredores biológicos entre reservas naturales
          es la medida de conservación con mayor costo-efectividad identificada en
          este estudio.
    fields: {}
    children: []

