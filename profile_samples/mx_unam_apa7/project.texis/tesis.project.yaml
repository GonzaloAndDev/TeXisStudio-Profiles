  - id: abstract_es
    element_id: abstract_es
    title: "Resumen"
    placement: front_matter
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: resumen-p1
        content: >
          El cambio climático representa una de las principales amenazas para la
          biodiversidad global. En México, los ecosistemas tropicales albergan una
          proporción significativa de la biodiversidad del planeta, pero son
          particularmente vulnerables a las alteraciones climáticas. Esta tesis
          analiza los efectos del cambio climático en la composición de especies,
          abundancias relativas y funcionamiento de ecosistemas tropicales en tres
          regiones representativas de México: Chiapas, Oaxaca y la Península de
          Yucatán. Se emplearon modelos de nicho ecológico, análisis de series
          temporales de temperatura y precipitación, y evaluaciones de campo para
          caracterizar los cambios observados y proyectados. Los resultados indican
          una disminución significativa en la riqueza de especies de anfibios y
          reptiles, y un desplazamiento altitudinal de comunidades de aves hacia
          zonas más elevadas. Se proponen medidas de mitigación y corredores
          biológicos como estrategia de conservación prioritaria.
    fields: {}
    children: []

  - id: abstract_en
    element_id: abstract_en
    title: "Abstract"
    placement: front_matter
    required: false
    enabled: true
    blocks:
      - type: paragraph
        id: abstract-p1
        content: >
          Climate change represents one of the main threats to global biodiversity.
          In Mexico, tropical ecosystems harbor a significant proportion of the planet's
          biodiversity but are particularly vulnerable to climate alterations. This thesis
          analyzes the effects of climate change on species composition, relative
          abundances, and ecosystem functioning in three representative tropical regions
          of Mexico: Chiapas, Oaxaca, and the Yucatán Peninsula. Ecological niche models,
          temperature and precipitation time series analyses, and field assessments were
          used to characterize observed and projected changes. Results indicate a
          significant decline in amphibian and reptile species richness, and an altitudinal
          shift of bird communities toward higher elevations. Biological corridors are
          proposed as a priority conservation strategy.
    fields: {}
    children: []

