  - id: abstract_es
    element_id: abstract_es
    title: "Resumen"
    placement: front_matter
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: res-p1
        content: >
          Antecedentes: La nefropatía diabética es la principal causa de
          enfermedad renal crónica terminal en México. Los inhibidores del
          cotransportador sodio-glucosa tipo 2 (iSGLT-2) han demostrado
          efectos nefroprotectores en ensayos clínicos controlados, pero
          su efectividad en poblaciones latinoamericanas en práctica clínica
          real es poco conocida.
      - type: paragraph
        id: res-p2
        content: >
          Objetivo: Evaluar la eficacia de los iSGLT-2 en la reducción de
          la progresión de nefropatía diabética en pacientes con diabetes
          mellitus tipo 2 atendidos en el Hospital General de México
          durante 2019-2024. Métodos: Estudio de cohorte retrospectivo.
          Se incluyeron 342 pacientes con DM2 y nefropatía diabética
          estadios G2-G4 (TFGe 15-89 mL/min/1.73 m²). La variable
          principal fue la reducción de TFGe ≥30\% o inicio de terapia
          renal sustitutiva. Resultados: Los pacientes con iSGLT-2 mostraron
          una reducción del riesgo relativo de 38\% (IC 95\%: 24-49\%,
          p\textless0.001) para el desenlace compuesto. Conclusiones: Los
          iSGLT-2 reducen significativamente la progresión de nefropatía
          diabética en pacientes mexicanos en condiciones de práctica clínica
          real.
    fields: {}
    children: []

  - id: abstract_en
    element_id: abstract_en
    title: "Abstract"
    placement: front_matter
    required: false
    enabled: true
    blocks:
      - type: paragraph
        id: abs-p1
        content: >
          Background: Diabetic nephropathy is the leading cause of end-stage
          renal disease in Mexico. SGLT-2 inhibitors have demonstrated
          nephroprotective effects in randomised trials, but their real-world
          effectiveness in Latin American populations remains poorly understood.
          Objective: To evaluate the efficacy of SGLT-2 inhibitors in reducing
          diabetic nephropathy progression in type 2 diabetes patients at the
          Hospital General de México, 2019-2024. Methods: Retrospective cohort
          study including 342 patients with DM2 and diabetic nephropathy stages
          G2-G4. Primary outcome: ≥30\% eGFR decline or renal replacement
          therapy initiation. Results: SGLT-2 inhibitor users showed a 38\%
          relative risk reduction (95\% CI: 24-49\%, p\textless0.001) for the
          composite outcome. Conclusions: SGLT-2 inhibitors significantly reduce
          diabetic nephropathy progression in Mexican patients under real-world
          conditions.
    fields: {}
    children: []

