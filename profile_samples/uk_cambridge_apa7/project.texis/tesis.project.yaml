  - id: abstract_en
    element_id: abstract_en
    title: "Abstract"
    placement: front_matter
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: abs-p1
        content: >
          The rise of large-scale pre-trained language models has dramatically
          advanced the state of the art in natural language processing (NLP).
          However, these models are computationally expensive to train and
          deploy, and they often underperform in low-resource settings—scenarios
          where annotated data is scarce, which is the case for the majority
          of the world's languages. This thesis presents a systematic
          investigation of efficient transformer architectures tailored for
          low-resource NLP tasks.
      - type: paragraph
        id: abs-p2
        content: >
          We propose a family of lightweight transformer variants that achieve
          competitive performance on benchmark NLP tasks while requiring
          substantially fewer parameters and less training data than standard
          models. Our key contributions include: (1) a novel attention
          mechanism that reduces quadratic complexity to near-linear; (2) a
          cross-lingual transfer learning framework for under-resourced
          languages; and (3) an empirical study across 24 languages spanning
          six language families. Experiments on machine translation, named
          entity recognition, and sentiment analysis demonstrate consistent
          improvements over baselines, with up to 34\% reduction in parameters
          at equivalent task performance.
    fields: {}
    children: []

