  - id: appendix_a
    element_id: appendix
    title: "Appendix A: Hyperparameter Configurations"
    placement: appendix
    required: false
    enabled: true
    blocks:
      - type: paragraph
        id: app-p1
        content: >
          All models were trained using the Adam optimiser with
          $\beta_1 = 0.9$, $\beta_2 = 0.98$, $\epsilon = 10^{-9}$.
          The learning rate schedule follows the formula proposed in the
          original transformer paper: $lr = d_\text{model}^{-0.5} \cdot
          \min(\text{step}^{-0.5}, \text{step} \cdot \text{warmup\_steps}^{-1.5})$
          with 4,000 warmup steps.
    fields: {}
