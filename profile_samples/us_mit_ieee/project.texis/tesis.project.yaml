  - id: introduction
    element_id: introduction
    title: Introduction
    placement: body
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: intro-p1
        content: >
          Distributed systems underpin modern cloud infrastructure, yet fundamental
          challenges in fault tolerance and consensus remain open. This thesis addresses
          three open problems in the design of consensus protocols for geographically
          distributed deployments.
      - type: paragraph
        id: intro-p2
        content: >
          The thesis is organized as follows. Chapter 2 reviews related work on
          consensus protocols and fault tolerance. Chapter 3 presents our proposed
          approach. Chapter 4 describes the experimental evaluation. Chapter 5 concludes.
    fields: {}
    children: []

  - id: background
    element_id: theoretical_framework
    title: Background and Related Work
    placement: body
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: bg-p1
        content: >
          The consensus problem, first formalized by Lamport et al. [1], requires a set
          of processes to agree on a single value despite failures. Paxos [2] and Raft [3]
          are the most widely deployed consensus algorithms in production systems.
    fields: {}
    children: []

  - id: methodology
    element_id: methodology
    title: Proposed Approach
    placement: body
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: meth-p1
        content: >
          We propose FastBFT, a Byzantine fault-tolerant consensus protocol that
          achieves O(log n) communication complexity per round under optimistic conditions.
          The protocol operates in three phases: pre-prepare, prepare, and commit.
    fields: {}
    children: []

  - id: experiments
    element_id: results
    title: Experimental Evaluation
    placement: body
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: exp-p1
        content: >
          We evaluated FastBFT on a 1000-node testbed hosted across three AWS regions.
          Median consensus latency was 12ms under fault-free conditions, compared to
          20ms for PBFT and 18ms for HotStuff.
    fields: {}
    children: []

  - id: conclusion
    element_id: conclusions
    title: Conclusion and Future Work
    placement: body
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: conc-p1
        content: >
          This thesis presented three contributions to Byzantine fault-tolerant consensus.
          FastBFT achieves 40% lower latency than existing approaches while maintaining
          formal safety and liveness guarantees. Future work includes deployment in
          heterogeneous network environments and integration with existing cloud orchestrators.
    fields: {}
    children: []

