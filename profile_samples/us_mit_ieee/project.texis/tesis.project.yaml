  - id: abstract
    element_id: abstract_en
    title: Abstract
    placement: front_matter
    required: true
    enabled: true
    blocks:
      - type: paragraph
        id: abs-p1
        content: >
          This thesis presents novel contributions to the field of distributed systems,
          focusing on fault-tolerant consensus protocols for large-scale deployments.
          We propose and analyze three algorithms that improve upon the state of the art
          in terms of latency, throughput, and resilience to Byzantine failures.
          Experimental evaluation on a 1000-node testbed demonstrates a 40% reduction
          in median consensus latency compared to existing approaches.
          The theoretical contributions include formal proofs of correctness and
          complexity bounds for each protocol.
    fields: {}
    children: []

