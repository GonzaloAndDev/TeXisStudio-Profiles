schema_version: "0.1.0"
id: "vancouver.health"
name: "Ciencias de la salud (IMRyD)"
description: "Estructura IMRyD para investigación clínica y biomédica. Bibliografía estilo Vancouver. Ideal para tesis de medicina, enfermería y ciencias de la salud."
author: "Gonzalo Andrade Estrella"
version: "0.1.0"
license: "AGPL-3.0"
tags:
  - salud
  - medicina
  - imryd
  - vancouver
  - tesis
  - licenciatura
  - maestria

document_class:
  name: "book"
  options:
    - "12pt"
    - "letterpaper"
    - "oneside"

latex_engine: "xelatex"
compiler: "latexmk"
bibliography_backend: "biber"
bibliography_style: "vancouver"

packages:
  - "fontspec"
  - "geometry"
  - "graphicx"
  - "booktabs"
  - "array"
  - "longtable"
  - "csquotes"
  - "setspace"
  - "hyperref"

sections:
  - id: "title_page"
    element_id: "title_page"
    placement: "front_matter"
    required: true
    title: null

  - id: "table_of_contents"
    element_id: "table_of_contents"
    placement: "front_matter"
    required: true
    title: null

  - id: "abstract_es"
    element_id: "abstract_es"
    placement: "front_matter"
    required: true
    title: "Resumen"

  - id: "abstract_en"
    element_id: "abstract_en"
    placement: "front_matter"
    required: false
    title: "Abstract"

  - id: "introduction"
    element_id: "introduction"
    placement: "body"
    required: true
    title: "Introducción"
    label: "sec:introduccion"

  - id: "materials_methods"
    element_id: "methodology"
    placement: "body"
    required: true
    title: "Material y métodos"
    label: "sec:metodos"

  - id: "results"
    element_id: "results"
    placement: "body"
    required: true
    title: "Resultados"
    label: "sec:resultados"

  - id: "discussion"
    element_id: "discussion"
    placement: "body"
    required: true
    title: "Discusión"
    label: "sec:discusion"

  - id: "conclusions"
    element_id: "conclusions"
    placement: "body"
    required: false
    title: "Conclusiones"
    label: "sec:conclusiones"

  - id: "references"
    element_id: "references"
    placement: "back_matter"
    required: true
    title: "Referencias"

  - id: "appendices"
    element_id: "appendices"
    placement: "appendix"
    required: false
    title: "Anexos"
